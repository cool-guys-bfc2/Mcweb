<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>CheerpJ Java App Example</title>
    <!-- Include the CheerpJ runtime loader script -->
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
</head>
<body>
    <p>Java application is loading...</p>

    <!-- Script to run the Java main class from the JAR -->

        cheerpjRunMain("net.minecraft.client.main.Main", "app/ImpactInstaller-0.9.5.jar");
    </script>
</body>
</html>
